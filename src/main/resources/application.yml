spring:
  profiles:
    active: dev
  threads:
    virtual:
      enabled: true
  jvm:
    system-properties:
      azure.keyvault.jca.certificates-refresh-interval-in-ms: 3600000
      azure.keyvault.jca.keys-refresh-interval-in-ms: 3600000
      azure.keyvault.jca.disable-challenge-resource-verification: true
      azure.tokenCredentialCacheEnabled: true
server:
  port: 8080
nfse:
  service:
    url: ${NFSE_SERVICE_URL:http://isshomo.sefin.fortaleza.ce.gov.br/grpfor-iss/ServiceGinfesImplService}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
logging:
  level:
    org.springframework.ws.client.MessageTracing: TRACE
    org.springframework.ws.client.core.WebServiceTemplate: TRACE
azure:
  keyvault:
    # Endpoint do seu Key Vault
    url: ${AZURE_KEYVAULT_URL}
    # Alias do certificado importado
    cert:
      alias: ${AZURE_KEYVAULT_CERT_ALIAS}

  client:
    # Client ID (App Registration)
    id: ${AZURE_CLIENT_ID}
    # Client Secret (App Registration)
    secret: ${AZURE_CLIENT_SECRET}

  tenant:
    # Tenant ID do Azure AD
    id: ${AZURE_TENANT_ID}


